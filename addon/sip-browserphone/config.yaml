name: SIP Browserphone
version: "1.0.1"
slug: sip_browserphone
description: Browserbasiertes SIP-Softphone mit Dashboard-Steuerung fuer Home Assistant
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:phone-in-talk
panel_title: SIP Browserphone
panel_admin: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  auto_connect: true
  retry_interval_seconds: 10
  display_name: Browserphone
  sip_username: ""
  sip_password: ""
  sip_domain_host: ""
  websocket_server_url: ""
  stun_server_url: "stun:stun.l.google.com:19302"
  dashboard_target: "200"
schema:
  auto_connect: bool
  retry_interval_seconds: "int(1,120)"
  display_name: "str?"
  sip_username: str
  sip_password: password
  sip_domain_host: str
  websocket_server_url: "match(^wss?://.+$)"
  stun_server_url: "str?"
  dashboard_target: "str?"
